# Physical AI AV Dataset Configuration for Alpamayo-R1
# This configuration supports both SFT (dataset loading) and RL (simulation) modes

env_type: physical_ai_av

# Environment settings
total_num_envs: null
auto_reset: False
ignore_terminations: False
use_rel_reward: False
seed: 42
group_size: 1
max_steps_per_rollout_epoch: 64  # 64 steps = 6.4s @ 10Hz
max_episode_steps: 64

# Video recording configuration
video_cfg:
  save_video: False
  info_on_video: True
  video_base_dir: ${runner.logger.log_path}/video/train

# Offload configuration
enable_offload: False

# Dataset configuration
dataset:
  name: "physical_ai_av"
  data_root: null  # Set to local path or use HuggingFace
  
  # Camera configuration
  cameras:
    - "CAMERA_CROSS_LEFT_120FOV"
    - "CAMERA_FRONT_WIDE_120FOV"
    - "CAMERA_CROSS_RIGHT_120FOV"
    - "CAMERA_FRONT_TELE_30FOV"
  
  # Data loading parameters
  num_history_steps: 16  # 1.6s @ 10Hz
  num_future_steps: 64   # 6.4s @ 10Hz
  time_step: 0.1         # 10Hz
  
  # Action normalization
  unnorm_key: "physical_ai_av"
  
  # For RL mode: simulation settings
  use_simulation: False
  sim_backend: "cpu"  # cpu or gpu
  
  # Reward configuration (for RL/GRPO)
  reward_config:
    # Trajectory smoothness (penalize jerky motions)
    smoothness_weight: 0.3
    
    # Goal proximity (if goal position is specified)
    goal_weight: 0.5
    goal_tolerance: 0.5  # meters
    
    # Collision avoidance
    collision_weight: 0.2
    collision_penalty: -1.0
    
    # Progress reward (distance covered toward goal)
    progress_weight: 0.0
    
    # Lane keeping (staying in lane)
    lane_weight: 0.0
    lane_tolerance: 0.3  # meters from lane center
    
    # Speed regulation
    speed_weight: 0.0
    target_speed: 10.0  # m/s
    speed_tolerance: 2.0

# Evaluation settings (override in eval config)
eval:
  total_num_envs: 32
  auto_reset: True
  ignore_terminations: True
  is_eval: True
  video_cfg:
    save_video: True
    video_base_dir: ${runner.logger.log_path}/video/eval
